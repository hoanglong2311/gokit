name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [[ -z "$latest_tag" ]]; then
            latest_tag="v0.0.0"
            commit_messages=$(git log --pretty=format:"%s")
          else
            commit_messages=$(git log --pretty=format:"%s" "$latest_tag"..HEAD)
          fi

          if [[ -z "$commit_messages" ]]; then
            echo "No new commits since $latest_tag, skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          major=$(echo "$latest_tag" | sed 's/^v//' | cut -d. -f1)
          minor=$(echo "$latest_tag" | sed 's/^v//' | cut -d. -f2)
          patch=$(echo "$latest_tag" | sed 's/^v//' | cut -d. -f3)

          change_type="none"
          while IFS= read -r msg; do
            if [[ "$msg" == *"BREAKING CHANGE"* || "$msg" == *"!"* ]]; then
              change_type="breaking"
              break
            elif [[ "$msg" == feat:* || "$msg" == feat\(* ]]; then
              change_type="feat"
            elif [[ ("$msg" == fix:* || "$msg" == fix\(* || "$msg" == refactor:* || "$msg" == perf:*) && "$change_type" != "feat" ]]; then
              change_type="fix"
            fi
          done <<< "$commit_messages"

          case $change_type in
            "breaking")
              ((major+=1)); minor=0; patch=0 ;;
            "feat")
              ((minor+=1)); patch=0 ;;
            "fix")
              ((patch+=1)) ;;
            *)
              echo "No conventional commits found, skipping release."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0 ;;
          esac

          new_tag="v${major}.${minor}.${patch}"
          echo "Bumping version: $latest_tag -> $new_tag"

          git tag "$new_tag"
          git push origin "$new_tag"

          echo "tag=$new_tag" >> "$GITHUB_OUTPUT"
          echo "version=${major}.${minor}.${patch}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        if: steps.bump.outputs.skip != 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Set up QEMU
        if: steps.bump.outputs.skip != 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.bump.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.bump.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.bump.outputs.skip != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/gokit:${{ steps.bump.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/gokit:latest

      - name: Create GitHub Release
        if: steps.bump.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: ${{ steps.bump.outputs.tag }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
