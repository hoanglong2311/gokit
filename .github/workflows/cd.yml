name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Bump version, update CHANGELOG, and push
        id: bump
        run: |
          npm install -g commit-and-tag-version

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [[ -z "$latest_tag" ]]; then
            commit_messages=$(git log --pretty=format:"%s")
          else
            commit_messages=$(git log --pretty=format:"%s" "$latest_tag"..HEAD)
          fi

          if [[ -z "$commit_messages" ]]; then
            echo "No new commits since last tag, skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          has_conventional=false
          while IFS= read -r msg; do
            if [[ "$msg" =~ ^(feat|fix|refactor|perf|docs|style|test|build|ci|chore|revert)(\(.*\))?!?:\ .+ ]]; then
              has_conventional=true
              break
            fi
          done <<< "$commit_messages"

          if [[ "$has_conventional" != "true" ]]; then
            echo "No conventional commits found, skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          commit-and-tag-version
          git push --follow-tags

          tag=$(git describe --tags --abbrev=0)
          version=${tag#v}
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        if: steps.bump.outputs.skip != 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Set up QEMU
        if: steps.bump.outputs.skip != 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.bump.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.bump.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.bump.outputs.skip != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            GOKIT_VERSION=v${{ steps.bump.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/gokit:${{ steps.bump.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/gokit:latest

      - name: Create GitHub Release
        if: steps.bump.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: ${{ steps.bump.outputs.tag }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
